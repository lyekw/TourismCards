<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEL Revision Cards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --p1:#1a4f8a;--p1l:#e8f0fb;--p1m:#b8d0f0;
  --p2:#2d6a1f;--p2l:#e6f4df;--p2m:#b5dba0;
  --p3:#8a4a0a;--p3l:#fdf0e0;--p3m:#f5cc8a;
  --ink:#1a1a1a;--muted:#666;--border:#e2e2e2;
  --card-bg:#fff;--page-bg:#f4f2ee;--radius:14px;
  --shadow:0 2px 14px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--page-bg);color:var(--ink);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--ink);color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.topbar h1{font-family:'DM Serif Display',serif;font-size:19px;font-weight:400;flex:1;}
.topbar-sub{font-size:11px;color:#888;}

/* FILTER BAR */
.filterbar{padding:10px 20px 8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:52px;z-index:90;}
.fbtn{font-size:11px;font-family:'DM Sans',sans-serif;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.fbtn:hover{background:var(--page-bg);}
.fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.fbtn.p1.active{background:var(--p1);border-color:var(--p1);}
.fbtn.p2.active{background:var(--p2);border-color:var(--p2);}
.fbtn.p3.active{background:var(--p3);border-color:var(--p3);}
.prog-wrap{margin-left:auto;display:flex;align-items:center;gap:8px;}
.prog-bar{width:100px;height:5px;background:var(--border);border-radius:10px;}
.prog-fill{height:100%;border-radius:10px;background:var(--p2);transition:width .4s;}
.prog-lbl{font-size:11px;color:var(--muted);white-space:nowrap;}

/* DECK */
.deck{padding:18px 20px 48px;display:flex;flex-direction:column;gap:24px;}
.part-section{}
.part-heading{font-family:'DM Serif Display',serif;font-size:16px;font-weight:400;margin-bottom:14px;padding-bottom:7px;border-bottom:2px solid;display:flex;align-items:center;gap:8px;}
.part-heading.p1{border-color:var(--p1);color:var(--p1);}
.part-heading.p2{border-color:var(--p2);color:var(--p2);}
.part-heading.p3{border-color:var(--p3);color:var(--p3);}
.part-heading span{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;background:currentColor;color:#fff;padding:2px 9px;border-radius:20px;}
.subtopic-group{margin-bottom:18px;}
.subtopic-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:10px;padding-left:1px;}
.cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(540px,1fr));gap:14px;}

/* CARD */
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 22px rgba(0,0,0,0.11);}
.card.done{border-left:4px solid var(--p2);}
.card-hdr{padding:7px 12px 5px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);background:#fafafa;}
.card-num{font-size:10px;font-weight:600;color:var(--muted);}
.cmd-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
.cmd-describe{background:#ede9fe;color:#4c1d95;}
.cmd-explain{background:#d1fae5;color:#064e3b;}
.cmd-identify{background:#fef3c7;color:#78350f;}
.cmd-define{background:#fee2e2;color:#7f1d1d;}
.cmd-state{background:#dcfce7;color:#14532d;}
.cmd-apply{background:#fce7f3;color:#831843;}
.cmd-evaluate{background:#dbeafe;color:#1e3a8a;}
.done-badge{margin-left:auto;font-size:9px;font-weight:700;color:var(--p2);background:var(--p2l);padding:2px 8px;border-radius:20px;display:none;}
.card.done .done-badge{display:inline-block;}

/* 2x2 */
.g22{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
.box{padding:12px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:120px;}
.box:nth-child(2n){border-right:none;}
.box:nth-child(3),.box:nth-child(4){border-bottom:none;}
.box-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.bico{font-size:12px;}

/* TL concept */
.box-concept{background:#fafafa;}
.box-concept .box-lbl{color:var(--p1);}
.c-name{font-family:'DM Serif Display',serif;font-size:14px;line-height:1.3;color:var(--ink);margin-bottom:5px;}
.c-req{font-size:11px;color:var(--muted);line-height:1.5;}

/* TR keywords */
.box-kw .box-lbl{color:var(--p2);}
.kw-list{display:flex;flex-wrap:wrap;gap:4px;}
.kp{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--ink);background:var(--page-bg);cursor:pointer;transition:all .12s;user-select:none;}
.kp:hover{background:var(--p2l);border-color:var(--p2m);}
.kp.ticked{background:var(--p2l);border-color:var(--p2);color:var(--p2);font-weight:600;}

/* BL diagram */
.box-diag .box-lbl{color:var(--p3);}
.img-area{border:1.5px dashed #ccc;border-radius:8px;min-height:85px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.img-area:hover{border-color:var(--p3);background:var(--p3l);}
.img-area img{width:100%;height:100%;object-fit:contain;border-radius:6px;position:absolute;top:0;left:0;}
.img-ph{font-size:10px;color:#bbb;text-align:center;}
.img-ph .ico{font-size:20px;display:block;margin-bottom:3px;}
.img-inp{display:none;}
.img-clr{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.45);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.img-area:hover .img-clr{display:flex;}

/* BR practice */
.box-prac .box-lbl{color:#555;}
.pq-text{font-size:11px;color:var(--ink);line-height:1.55;margin-bottom:6px;font-style:italic;border-left:3px solid var(--border);padding-left:7px;}
.pq-text[contenteditable="true"]{outline:none;border-left-color:var(--p1);background:#f0f6ff;border-radius:0 4px 4px 0;}
.sm-btn{font-size:10px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sm-btn:hover{background:var(--page-bg);}
.btn-row{display:flex;gap:5px;margin:5px 0;}
.ans-ta{width:100%;min-height:50px;resize:vertical;font-size:11px;font-family:'DM Sans',sans-serif;padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--page-bg);color:var(--ink);transition:border-color .15s;}
.ans-ta:focus{outline:none;border-color:var(--p1);background:#fff;}
.ans-ta::placeholder{color:#ccc;}
.mark-btn{font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;padding:5px 11px;border-radius:7px;background:var(--ink);color:#fff;border:none;cursor:pointer;}
.mark-btn:hover{background:#333;}
.mark-btn:disabled{opacity:.4;cursor:not-allowed;}
.ans-fb{font-size:10px;line-height:1.5;color:var(--muted);margin-top:5px;padding:5px 9px;border-radius:7px;background:var(--page-bg);display:none;}
.ans-fb.show{display:block;}
.ans-fb.good{background:#d1fae5;color:#064e3b;}
.ans-fb.ok{background:#fef3c7;color:#78350f;}
.ans-fb.low{background:#fee2e2;color:#7f1d1d;}
.spin{display:inline-block;width:11px;height:11px;border:2px solid #fff4;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:3px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>

function renderDeck(filter){
  const deck=document.getElementById('deck');
  deck.innerHTML='';
  const filtered=CARDS.filter(c=>filter==='all'?true:filter==='undone'?!done[c.id]:c.part===filter);
  if(!filtered.length){deck.innerHTML='<div class="empty">🎉 All cards in this view are marked done!</div>';return;}
  const groups={};
  for(const c of filtered){
    const pk=c.part+'|||'+c.partLabel;
    if(!groups[pk])groups[pk]={};
    if(!groups[pk][c.sub])groups[pk][c.sub]=[];
    groups[pk][c.sub].push(c);
  }
  for(const[pk,subs]of Object.entries(groups)){
    const[part,partLabel]=pk.split('|||');
    const sec=document.createElement('div');sec.className='part-section';
    const ph=document.createElement('div');ph.className=`part-heading ${part}`;
    const tot=Object.values(subs).flat().length;
    ph.innerHTML=`${partLabel} <span>${tot} cards</span>`;
    sec.appendChild(ph);
    for(const[sub,cards]of Object.entries(subs)){
      const sg=document.createElement('div');sg.className='subtopic-group';
      sg.innerHTML=`<div class="subtopic-lbl">${sub}</div>`;
      const row=document.createElement('div');row.className='cards-row';
      for(const c of cards)row.appendChild(buildCard(c));
      sg.appendChild(row);sec.appendChild(sg);
    }
    deck.appendChild(sec);
  }
  updateProg();
}

function buildCard(c){
  const w=document.createElement('div');
  w.className='card'+(done[c.id]?' done':'');
  w.id=`card-${c.id}`;
  const cmds=c.cmd.map(x=>`<span class="cmd-tag cmd-${x.toLowerCase()}">${x}</span>`).join(' ');
  const kws=c.kw.map((k,i)=>`<span class="kp" id="kp-${c.id}-${i}" onclick="toggleKw(${c.id},${i})">${k}</span>`).join('');
  const pq=PQ_CACHE[c.id]||'';
  const img=imgStore[c.id]||'';
  w.innerHTML=`
    <div class="card-hdr">
      <span class="card-num">Q${c.id}</span>${cmds}
      <span class="done-badge">✓ Done</span>
    </div>
    <div class="g22">
      <div class="box box-concept">
        <div class="box-lbl"><span class="bico">📌</span> Concept & Requirement</div>
        <div class="c-name">${c.concept}</div>
        <div class="c-req">${c.req}</div>
      </div>
      <div class="box box-kw">
        <div class="box-lbl"><span class="bico">🔑</span> Keywords — click to tick off</div>
        <div class="kw-list">${kws}</div>
      </div>
      <div class="box box-diag">
        <div class="box-lbl"><span class="bico">🖼</span> Diagram / Picture</div>
        <div class="img-area" id="ia-${c.id}" onclick="trigUp(${c.id})">
          ${img?`<img src="${img}" alt="diagram">`:'<div class="img-ph"><span class="ico">＋</span>Click to upload image</div>'}
          <button class="img-clr" onclick="clrImg(event,${c.id})">✕</button>
        </div>
        <input type="file" accept="image/*" class="img-inp" id="ii-${c.id}" onchange="loadImg(${c.id},this)">
      </div>
      <div class="box box-prac">
        <div class="box-lbl"><span class="bico">✏️</span> Practice Question</div>
        <div class="pq-text" id="pq-${c.id}">${pq}</div>
        <div class="btn-row">
          <button class="sm-btn" onclick="editPQ(${c.id})" id="edit-${c.id}">Edit question</button>
        </div>
        <textarea class="ans-ta" id="ans-${c.id}" placeholder="Write your answer here using the keywords above…"></textarea>
        <div class="btn-row">
          <button class="mark-btn" onclick="markAns(${c.id})" id="mbtn-${c.id}">Mark my answer</button>
          <button class="sm-btn" onclick="markDone(${c.id})" id="dbtn-${c.id}">${done[c.id]?'✓ Done':'Mark as done'}</button>
        </div>
        <div class="ans-fb" id="fb-${c.id}"></div>
      </div>
    </div>`;
  return w;
}

function toggleKw(id,i){document.getElementById(`kp-${id}-${i}`).classList.toggle('ticked');}
function trigUp(id){document.getElementById(`ii-${id}`).click();}
function loadImg(id,inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{imgStore[id]=e.target.result;const a=document.getElementById(`ia-${id}`);a.innerHTML=`<img src="${e.target.result}" alt="diagram"><button class="img-clr" onclick="clrImg(event,${id})">✕</button>`;};
  r.readAsDataURL(f);
}
function clrImg(e,id){e.stopPropagation();imgStore[id]=null;document.getElementById(`ia-${id}`).innerHTML='<div class="img-ph"><span class="ico">＋</span>Click to upload image</div><button class="img-clr" onclick="clrImg(event,'+id+')">✕</button>';}

function editPQ(id){
  const el=document.getElementById(`pq-${id}`);
  const btn=document.getElementById(`edit-${id}`);
  if(el.contentEditable==='true'){el.contentEditable='false';PQ_CACHE[id]=el.textContent;btn.textContent='Edit question';}
  else{el.contentEditable='true';el.focus();btn.textContent='Save';}
}

async function markAns(id){
  const c=CARDS.find(x=>x.id===id);
  const ans=document.getElementById(`ans-${id}`).value.trim();
  if(!ans){alert('Please write an answer first!');return;}
  const pq=document.getElementById(`pq-${id}`).textContent;
  const btn=document.getElementById(`mbtn-${id}`);
  btn.innerHTML='<span class="spin"></span>Marking…';btn.disabled=true;
  const prompt=`You are marking an O-Level Geography student's answer in Singapore. Be encouraging.
Question: ${pq}
Expected keywords: ${JSON.stringify(c.kw)}
Student answer: "${ans}"
Check which keywords/concepts were demonstrated (accept paraphrases). Reply ONLY with JSON, no markdown:
{"score":"X/Y","grade":"good|ok|low","feedback":"2 sentences: what they did well + one thing to improve.","hits":[],"missed":[]}`;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})});
    const data=await resp.json();
    const text=data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const p=JSON.parse(text);
    const fb=document.getElementById(`fb-${id}`);
    fb.className=`ans-fb show ${p.grade}`;
    const h=p.hits.map(k=>`<span style="background:#bbf7d0;color:#14532d;padding:1px 6px;border-radius:10px;font-size:10px;margin:2px;display:inline-block;">${k}</span>`).join('');
    const m=p.missed.map(k=>`<span style="background:#fecaca;color:#7f1d1d;padding:1px 6px;border-radius:10px;font-size:10px;margin:2px;display:inline-block;font-style:italic;">${k}</span>`).join('');
    fb.innerHTML=`<strong>${p.score}</strong> — ${p.feedback}${h?'<br>✓ '+h:''}${m?'<br>✗ '+m:''}`;
    if(p.grade==='good')markDone(id);
  }catch(e){
    document.getElementById(`fb-${id}`).className='ans-fb show ok';
    document.getElementById(`fb-${id}`).textContent='Marking failed — check connection and try again.';
  }
  btn.innerHTML='Re-mark';btn.disabled=false;
}

function markDone(id){
  done[id]=!done[id];
  const c=document.getElementById(`card-${id}`);
  if(done[id])c.classList.add('done');else c.classList.remove('done');
  document.getElementById(`dbtn-${id}`).textContent=done[id]?'✓ Done':'Mark as done';
  updateProg();
}

function updateProg(){
  const d=Object.values(done).filter(Boolean).length;
  document.getElementById('prog-fill').style.width=(d/65*100)+'%';
  document.getElementById('prog-lbl').textContent=`${d} / 65 done`;
}

function filterCards(btn,f){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDeck(f);
}

renderDeck('all');
</script>
